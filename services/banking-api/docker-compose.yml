services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
      POSTGRES_DB: banking
    ports:
      - "5433:5432"
    volumes:
      - banking_pg:/var/lib/postgresql/data

  banking-api:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://banking:banking@postgres:5432/banking?schema=public
    depends_on:
      - postgres
    volumes:
      - ./secrets:/secrets:ro

volumes:
  banking_pg:
